# `sudo docker compose -f POC/docker-compose.yml up -d`  -> starts web + caddy (auto-HTTPS).
# The scraper is one-shot; run it (or from cron) with:
#   docker compose -f POC/docker-compose.yml run --rm runner
#   docker compose -f POC/docker-compose.yml run --rm runner --show-adult   # TEREA
services:
  # One-shot scraper. Profiled out of `up` — invoke explicitly via `run`.
  runner:
    build: .
    image: tokped-runner:latest
    profiles: ["manual"]
    env_file:
      - .env            # TOKPED_CRED_URL + TOKPED_CRED_TOKEN (points at the home auth service)
    volumes:
      - ./data:/app/data        # persist SQLite + CSV exports + HTML report
      - ./config:/app/config    # tune filters.json / city_ids.json without a rebuild

  # Web UI + trigger API (internal :8000). Caddy terminates TLS and proxies to it.
  web:
    build: .
    image: tokped-runner:latest
    entrypoint: ["python", "-m", "uvicorn", "webapp.app:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env            # + TOKPED_WEB_TOKEN to protect POST /api/run
    expose:
      - "8000"          # reachable as web:8000 on the compose network (no host port)
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped

  # Reverse proxy + AUTOMATIC HTTPS (Let's Encrypt). Needs DNS -> host + ports 80/443 open.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # PERSIST certs (avoids Let's Encrypt rate limits on restart)
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
