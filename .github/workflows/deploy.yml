name: deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'POC/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check
        run: python -m compileall POC/src POC/webapp
      - name: Offline pipeline smoke test
        working-directory: POC
        run: python src/runner.py --sample --no-report
      - name: Web app import check
        working-directory: POC
        run: |
          pip install -r requirements-web.txt
          python -c "import webapp.app; print('webapp import OK')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Copy the code straight from the runner (works for private repos; no git on the VM).
      - name: Copy POC to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "POC"
          target: "~/tokped-scraper"
          overwrite: true

      # Build the runner image. Requires only Docker on the VM (see the launch script).
      - name: Build on the VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found - installing (one time)..."
              command -v curl >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y -qq curl; }
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER" || true
            fi
            cd ~/tokped-scraper
            if [ ! -f POC/.env ]; then
              echo "POC/.env not found - creating an empty placeholder (add TOKPED_CRED_URL / TOKPED_CRED_TOKEN / TOKPED_WEB_TOKEN later)."
              touch POC/.env
            fi
            sudo docker compose -f POC/docker-compose.yml build
            sudo docker compose -f POC/docker-compose.yml up -d
            echo "deploy: build OK; web + caddy up"
